name: Build Portable Windows EXE

on:
  push:
    branches: [ main, "issue-*" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PROJECT_NAME: OneTry
  UE_VERSION: "5.3"
  UE_IMAGE: "ghcr.io/epicgames/unreal-engine:dev-slim-5.3"

jobs:
  # -----------------------------------------------------------------------
  # checklicense: determines whether the build can run based on available
  # Epic credentials. Push/PR builds stay green without credentials so
  # repository setup does not block CI; the actual build job only runs
  # when EPIC_GITHUB_TOKEN is configured.
  # -----------------------------------------------------------------------
  checklicense:
    name: Check for Epic Games credentials in GitHub Secrets
    runs-on: ubuntu-latest
    outputs:
      has_credentials: ${{ steps.check.outputs.has_credentials }}
    steps:
      - id: check
        env:
          EPIC_GITHUB_TOKEN: ${{ secrets.EPIC_GITHUB_TOKEN }}
        run: |
          if [ -n "$EPIC_GITHUB_TOKEN" ]; then
            echo "Epic credentials are set; build will run."
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
          else
            echo "EPIC_GITHUB_TOKEN is NOT set."
            echo "To enable the portable EXE build:"
            echo "  1. Link your GitHub account to Epic Games at https://www.unrealengine.com/en-US/ue-on-github"
            echo "  2. Add EPIC_GITHUB_TOKEN repository secret (Settings → Secrets and variables → Actions)"
            echo "See README.md for full setup instructions."
            echo "has_credentials=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Report portable EXE artifact availability
        if: steps.check.outputs.has_credentials == 'false'
        run: |
          echo "::warning title=Portable EXE artifact is not available::EPIC_GITHUB_TOKEN is missing, so the Windows packaging job is skipped and no OneTry-Win64 ZIP artifact is uploaded for this run."
          echo "Add EPIC_GITHUB_TOKEN as a repository secret to produce the portable EXE artifact."

  # -----------------------------------------------------------------------
  # build: packages the UE5 project to a Windows Shipping EXE using
  # UnrealAutomationTool (BuildCookRun) inside Epic's official Docker
  # image. Runs on a Linux runner (cross-compiles to Win64).
  # -----------------------------------------------------------------------
  build:
    needs: checklicense
    if: needs.checklicense.outputs.has_credentials == 'true'
    name: Package Windows Shipping Build (Win64)
    runs-on: ubuntu-latest
    container:
      image: ${{ env.UE_IMAGE }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.EPIC_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Package Win64 Shipping EXE
        run: |
          /home/ue4/UnrealEngine/Engine/Build/BatchFiles/RunUAT.sh BuildCookRun \
            -project="$GITHUB_WORKSPACE/${{ env.PROJECT_NAME }}.uproject" \
            -noP4 \
            -platform=Win64 \
            -clientconfig=Shipping \
            -cook \
            -allmaps \
            -build \
            -stage \
            -pak \
            -archive \
            -archivedirectory="$GITHUB_WORKSPACE/ArchivedBuilds" \
            -prereqs \
            -nodebuginfo

      - name: List packaged output
        if: always()
        run: |
          echo "Contents of ArchivedBuilds/:"
          find ArchivedBuilds -maxdepth 4 -type f | head -100 || echo "ArchivedBuilds/ not found"

      - name: Create portable ZIP archive
        run: |
          cd ArchivedBuilds
          zip -r "../${{ env.PROJECT_NAME }}-Win64.zip" WindowsNoEditor/ \
            -x "*.pdb" "*.debug" "Manifest_*" || \
          zip -r "../${{ env.PROJECT_NAME }}-Win64.zip" . \
            -x "*.pdb" "*.debug" "Manifest_*"

      - name: Upload portable EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-Win64-${{ github.run_number }}
          path: ${{ env.PROJECT_NAME }}-Win64.zip
          retention-days: 30
          if-no-files-found: error
